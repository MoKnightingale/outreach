<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OUTreach Output</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #slide {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 60px;
    text-align: center;
    background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #071224 100%);
    transition: opacity 0.4s ease;
  }

  #slide.blank { background: #000 !important; }
  #slide.blank #line1,
  #slide.blank #line2 { opacity: 0; }

  #line1 {
    font-family: 'Segoe UI', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    text-shadow: 0 4px 24px rgba(0,0,0,0.9), 0 0 60px rgba(0,0,0,0.6);
    transition: all 0.3s ease;
    letter-spacing: -0.01em;
  }

  #line2 {
    font-family: 'Segoe UI', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.2;
    text-shadow: 0 4px 24px rgba(0,0,0,0.9), 0 0 60px rgba(0,0,0,0.6);
    transition: all 0.3s ease;
    letter-spacing: -0.01em;
  }

  .bright { color: #ffe28a !important; }

  #slide-label {
    position: absolute;
    bottom: 24px;
    right: 32px;
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    font-family: monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* fade transition */
  .fade-out { opacity: 0 !important; }
  .fade-in  { opacity: 1 !important; }
</style>
</head>
<body>
<div id="slide">
  <div id="line1">You are here</div>
  <div id="line2">moving in our midst</div>
  <div id="slide-label">VERSE 1</div>
</div>

<script>
  // Listen for slide updates from the main Electron process
  window.addEventListener('message', (event) => {
    updateSlide(event.data);
  });

  // Also listen via the outreach bridge if available
  if (window.outreachOutput) {
    window.outreachOutput.onSlide((data) => {
      updateSlide(data);
    });
  }

  function updateSlide(data) {
    if (!data) return;

    const slide  = document.getElementById('slide');
    const line1  = document.getElementById('line1');
    const line2  = document.getElementById('line2');
    const label  = document.getElementById('slide-label');

    // Fade out
    slide.style.opacity = '0';

    setTimeout(() => {
      if (data.blank) {
        slide.classList.add('blank');
        line1.textContent = '';
        line2.textContent = '';
        label.textContent = '';
      } else {
        slide.classList.remove('blank');
        line1.textContent = data.line1 || '';
        line2.textContent = data.line2 || '';
        label.textContent = data.label || '';

        if (data.bright) {
          line1.classList.add('bright');
          line2.classList.add('bright');
        } else {
          line1.classList.remove('bright');
          line2.classList.remove('bright');
        }
      }
      // Fade back in
      slide.style.opacity = '1';
    }, 200);
  }
</script>
</body>
</html>
