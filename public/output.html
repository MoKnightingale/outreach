<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>OUTreach Output</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  #camera-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #071224 100%);
  }

  #camera-feed {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
  }

  #camera-feed-2 {
    position: absolute;
    top: 0; right: 0;
    width: 35%; height: 35%;
    object-fit: cover;
    display: none;
    border-left: 2px solid #4f9eff;
    border-bottom: 2px solid #4f9eff;
    z-index: 5;
  }

  #slide-layer {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    justify-content: center;
    flex-direction: column; gap: 12px;
    padding: 60px; text-align: center;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  #overlay-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  /* OVERLAY POSITIONS */
  .overlay-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px; text-align: center; gap: 10px;
  }

  .overlay-bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.88);
    border-top: 3px solid #4f9eff;
    padding: 20px 56px 24px;
  }

  .overlay-top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.88);
    border-bottom: 3px solid #4f9eff;
    padding: 20px 56px 24px;
  }

  .overlay-left-panel {
    position: absolute; top: 0; bottom: 0; left: 0;
    width: 38%;
    background: rgba(0,0,0,0.82);
    border-right: 3px solid #4f9eff;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 40px 36px; gap: 14px;
  }

  .overlay-right-panel {
    position: absolute; top: 0; bottom: 0; right: 0;
    width: 38%;
    background: rgba(0,0,0,0.82);
    border-left: 3px solid #4f9eff;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 40px 36px; gap: 14px;
  }

  /* TEXT STYLES */
  .main-text {
    font-size: 72px; font-weight: 800;
    color: #ffffff; line-height: 1.25;
    text-shadow: 0 4px 28px rgba(0,0,0,0.95);
    letter-spacing: -0.01em;
  }

  .main-text.bright { color: #ffe28a; }

  .overlay-text {
    font-size: 40px; font-weight: 700;
    color: #ffffff; line-height: 1.4;
    text-shadow: 0 2px 16px rgba(0,0,0,0.95);
  }

  .bar-text {
    font-size: 32px; font-weight: 700;
    color: #ffffff; line-height: 1.4;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }

  .ref-text {
    font-size: 20px; color: #4f9eff;
    font-weight: 600; margin-top: 6px;
  }

  .panel-text {
    font-size: 28px; font-weight: 700;
    color: #ffffff; line-height: 1.5;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }

  .panel-ref {
    font-size: 18px; color: #4f9eff; font-weight: 600;
  }

  #slide-label {
    position: absolute; bottom: 24px; right: 32px;
    font-size: 14px; color: rgba(255,255,255,0.15);
    font-family: monospace; letter-spacing: 0.12em;
    text-transform: uppercase; z-index: 30;
  }

  /* CAMERA STATUS BADGE */
  #camera-badge {
    position: absolute; top: 16px; left: 16px;
    background: rgba(239,68,68,0.85);
    color: white; font-size: 13px; font-weight: 700;
    padding: 4px 12px; border-radius: 5px;
    letter-spacing: 0.08em; display: none;
    z-index: 40;
  }

  /* FADE TRANSITION */
  .fading { opacity: 0 !important; }
</style>
</head>
<body>

<div id="camera-bg">
  <video id="camera-feed" autoplay muted playsinline></video>
</div>

<video id="camera-feed-2" autoplay muted playsinline></video>
<div id="slide-layer"></div>
<div id="overlay-layer"></div>
<div id="slide-label"></div>
<div id="camera-badge">● LIVE</div>

<script>
const { ipcRenderer } = require('electron')

const cameraBg     = document.getElementById('camera-bg')
const cameraFeed   = document.getElementById('camera-feed')
const cameraFeed2  = document.getElementById('camera-feed-2')
const slideLayer   = document.getElementById('slide-layer')
const overlayLayer = document.getElementById('overlay-layer')
const slideLabel   = document.getElementById('slide-label')
const cameraBadge  = document.getElementById('camera-badge')

let cameraStreams   = {}
let currentPosition = 'center'
let isCameraActive  = false

console.log('OUTreach Output Window Ready ✅')

// ── RENDER FULL SLIDE
function renderSlide(data) {
  slideLayer.style.opacity = '0'
  setTimeout(() => {
    if (data.blank || data.black) {
      cameraBg.style.background = '#000'
      slideLayer.innerHTML = ''
      overlayLayer.innerHTML = ''
      slideLabel.textContent = ''
    } else {
      if (!isCameraActive) {
        cameraBg.style.background = 'linear-gradient(135deg,#0a1628 0%,#0d1f3c 50%,#071224 100%)'
      }
      const bright = data.bright ? 'bright' : ''
      slideLayer.innerHTML = `
        <div class="main-text ${bright}">${data.line1 || ''}</div>
        ${data.line2 ? `<div class="main-text ${bright}">${data.line2}</div>` : ''}
      `
      slideLabel.textContent = data.label || ''
    }
    slideLayer.style.opacity = '1'
  }, 200)
}

// ── RENDER OVERLAY (Bible verse / text over camera)
function renderOverlay(data) {
  overlayLayer.innerHTML = ''
  if (!data || data.blank) return

  const pos = data.position || currentPosition
  let html  = ''

  if (pos === 'center') {
    html = `<div class="overlay-center">
      <div class="overlay-text">${data.line1 || ''}</div>
      ${data.line2 ? `<div class="overlay-text">${data.line2}</div>` : ''}
      ${data.ref ? `<div class="ref-text">${data.ref}</div>` : ''}
    </div>`
  } else if (pos === 'bottom-bar') {
    html = `<div class="overlay-bottom-bar">
      <div class="bar-text">${data.line1 || ''}${data.line2 ? ' ' + data.line2 : ''}</div>
      ${data.ref ? `<div class="ref-text">${data.ref}</div>` : ''}
    </div>`
  } else if (pos === 'top-bar') {
    html = `<div class="overlay-top-bar">
      <div class="bar-text">${data.line1 || ''}${data.line2 ? ' ' + data.line2 : ''}</div>
      ${data.ref ? `<div class="ref-text">${data.ref}</div>` : ''}
    </div>`
  } else if (pos === 'left-panel') {
    html = `<div class="overlay-left-panel">
      <div class="panel-text">${data.line1 || ''}</div>
      ${data.line2 ? `<div class="panel-text">${data.line2}</div>` : ''}
      ${data.ref ? `<div class="panel-ref">${data.ref}</div>` : ''}
    </div>`
  } else if (pos === 'right-panel') {
    html = `<div class="overlay-right-panel">
      <div class="panel-text">${data.line1 || ''}</div>
      ${data.line2 ? `<div class="panel-text">${data.line2}</div>` : ''}
      ${data.ref ? `<div class="panel-ref">${data.ref}</div>` : ''}
    </div>`
  }

  overlayLayer.innerHTML = html
}

// ── START SINGLE CAMERA
async function startCamera(deviceId) {
  try {
    // Stop any existing stream
    if (cameraStreams.main) {
      cameraStreams.main.getTracks().forEach(t => t.stop())
    }

   const constraints = {
  video: deviceId
    ? { deviceId: { ideal: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    : { width: { ideal: 1920 }, height: { ideal: 1080 } },
  audio: false
}

    const stream = await navigator.mediaDevices.getUserMedia(constraints)
    cameraStreams.main = stream
    cameraFeed.srcObject = stream
    cameraFeed.style.display = 'block'
    cameraBg.style.background = 'transparent'
    cameraBadge.style.display = 'block'
    isCameraActive = true

    // Clear slide layer so camera shows through
    slideLayer.innerHTML = ''
    slideLabel.textContent = ''
    console.log('✅ Camera started:', deviceId)
  } catch(e) {
    console.error('Camera start error:', e)
  }
}

// ── START MIX (two cameras)
async function startCameraMix(deviceIds) {
  try {
    // Start primary camera full screen
    await startCamera(deviceIds[0])

    // Start secondary camera in corner
    if (deviceIds[1]) {
      if (cameraStreams.secondary) {
        cameraStreams.secondary.getTracks().forEach(t => t.stop())
      }
      const stream2 = await navigator.mediaDevices.getUserMedia({
  video: { deviceId: { ideal: deviceIds[1] }, width: { ideal: 640 }, height: { ideal: 360 } },
  audio: false
})
      cameraStreams.secondary = stream2
      cameraFeed2.srcObject = stream2
      cameraFeed2.style.display = 'block'
      console.log('✅ Secondary camera started:', deviceIds[1])
    }
  } catch(e) {
    console.error('Mix camera error:', e)
  }
}

// ── STOP ALL CAMERAS
function stopAllCameras() {
  Object.values(cameraStreams).forEach(stream => {
    stream.getTracks().forEach(t => t.stop())
  })
  cameraStreams = {}
  cameraFeed.style.display = 'none'
  cameraFeed.srcObject = null
  cameraFeed2.style.display = 'none'
  cameraFeed2.srcObject = null
  cameraBg.style.background = 'linear-gradient(135deg,#0a1628 0%,#0d1f3c 50%,#071224 100%)'
  cameraBadge.style.display = 'none'
  isCameraActive = false
  console.log('📷 Cameras stopped')
}

// ── IPC: RECEIVE ALL MESSAGES FROM MAIN PROCESS
ipcRenderer.on('slide-update', (_e, data) => {
  console.log('📨 Received:', JSON.stringify(data).slice(0, 80))

  // Camera actions
  if (data.cameraAction === 'start') {
    startCamera(data.deviceId)
    return
  }
  if (data.cameraAction === 'stop') {
    stopAllCameras()
    return
  }
  if (data.cameraAction === 'mix') {
    startCameraMix(data.deviceIds || [])
    return
  }

  // Position update
  if (data.setPosition) {
    currentPosition = data.setPosition
    return
  }

  // Overlay (Bible verse / text overlay over camera)
  if (data.isOverlay) {
    renderOverlay(data)
    return
  }

  // Regular slide
  renderSlide(data)
  if (data.clearOverlay) overlayLayer.innerHTML = ''
})
</script>
</body>
</html>
